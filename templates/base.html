<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlDocPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <header class="bg-slate-900 text-white shadow">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold">ControlDocPro</h1>
                <p class="text-sm text-slate-300">Gestión documental y contractual</p>
            </div>
            <nav class="text-sm">
                <a href="/users" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium">Usuarios</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-3">
                    {% for category, message in messages %}
                        <div class="rounded-xl px-4 py-3 shadow-sm
                            {% if category == 'success' %}
                                bg-green-100 text-green-800 border border-green-200
                            {% else %}
                                bg-red-100 text-red-800 border border-red-200
                            {% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
