{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow p-8">
        <div class="mb-8 text-center">
            <h2 class="text-3xl font-bold text-slate-900">Iniciar sesión</h2>
            <p class="text-slate-600 mt-2">Acceda a ControlDocPro con su cuenta.</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Correo electrónico</label>
                <input
                    type="email"
                    name="email"
                    required
                    class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="usuario@empresa.com"
                >
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    required
                    class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Ingrese su contraseña"
                >
            </div>

            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold shadow">
                Ingresar
            </button>
        </form>
    </div>
</div>
{% endblock %}
